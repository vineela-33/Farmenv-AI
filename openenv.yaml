name: farmenv-ai
version: "1.0.0"
description: "Smart Farm OpenEnv environment for AI agent learning"

server:
  url: https://vineela-n-farmenv-ai.hf.space

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

tasks:
  - name: irrigate
    description: Manage farm irrigation to maximize crop health
    max_steps: 30
